global
    log stdout local0
    log stdout local1 notice
    daemon
    maxconn 4096

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    retries 3
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    balance roundrobin

# Statistics
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE

# ClickHouse HTTP Interface (8124)
frontend clickhouse_http
    bind *:8124
    mode http
    option httplog
    default_backend clickhouse_http_servers

backend clickhouse_http_servers
    mode http
    balance roundrobin
    option httpchk GET /ping
    http-check expect status 200
    server clickhouse-1 clickhouse-1:8123 check inter 2s rise 2 fall 3
    server clickhouse-2 clickhouse-2:8123 check inter 2s rise 2 fall 3
    server clickhouse-3 clickhouse-3:8123 check inter 2s rise 2 fall 3

# ClickHouse Native Protocol (9000)
frontend clickhouse_native
    bind *:9000
    mode tcp
    option tcplog
    default_backend clickhouse_native_servers

backend clickhouse_native_servers
    mode tcp
    balance roundrobin
    option tcp-check
    tcp-check connect port 9000
    server clickhouse-1 clickhouse-1:9000 check inter 2s rise 2 fall 3
    server clickhouse-2 clickhouse-2:9000 check inter 2s rise 2 fall 3
    server clickhouse-3 clickhouse-3:9000 check inter 2s rise 2 fall 3

